name: Update Lotto Data

on:
  schedule:
    - cron: "0 12 * * 6"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update lotto
        run: |
          node <<EOF
          const fs = require("fs");

          async function run() {
            try{
              let n = 1200;

              while(true){
                let res = await fetch("https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=" + n);
                let d = await res.json();

                if(d.returnValue !== "success"){
                  n--;
                  break;
                }
                n++;
              }

              let res = await fetch("https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=" + n);
              let d = await res.json();

              console.log("최신 회차:", d.drwNo);

              let newData = {
                round: d.drwNo,
                date: d.drwNoDate,
                numbers: [d.drwtNo1,d.drwtNo2,d.drwtNo3,d.drwtNo4,d.drwtNo5,d.drwtNo6],
                bonus: d.bnusNo,
                first: d.firstWinamnt,
                firstCount: d.firstPrzwnerCo
              };

              let data = [];
              if(fs.existsSync("lotto.json")){
                data = JSON.parse(fs.readFileSync("lotto.json"));
              }

              if(!data.find(x=>x.round === newData.round)){
                data.unshift(newData);
                fs.writeFileSync("lotto.json", JSON.stringify(data,null,2));
                console.log("추가 완료");
              } else {
                console.log("이미 최신 데이터 있음");
              }

            }catch(e){
              console.error("에러:", e);
              process.exit(1);
            }
          }

          run();
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add lotto.json
          git commit -m "update lotto" || echo "no change"
          git push

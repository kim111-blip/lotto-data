name: Update Lotto Data

on:
  schedule:
    - cron: "0 12 * * 6"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update lotto
        run: |
          node <<EOF
          const fs = require("fs");

          async function run() {
            const url = "https://raw.githubusercontent.com/JaehyunLee25/lotto/master/lotto.csv";

            let res = await fetch(url);
            let text = await res.text();

            let lines = text.trim().split("\n");
            let last = lines[lines.length - 1].split(",");

            let newData = {
              round: parseInt(last[0]),
              date: last[1],
              numbers: [
                parseInt(last[2]),
                parseInt(last[3]),
                parseInt(last[4]),
                parseInt(last[5]),
                parseInt(last[6]),
                parseInt(last[7])
              ],
              bonus: parseInt(last[8]),
              first: parseInt(last[9]),
              firstCount: parseInt(last[10])
            };

            let data = [];
            if(fs.existsSync("lotto.json")){
              data = JSON.parse(fs.readFileSync("lotto.json"));
            }

            if(!data.find(x=>x.round === newData.round)){
              data.unshift(newData);
              fs.writeFileSync("lotto.json", JSON.stringify(data,null,2));
              console.log("업데이트 완료:", newData.round);
            } else {
              console.log("이미 최신 상태");
            }
          }

          run();
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add lotto.json
          git commit -m "update lotto" || echo "no change"
          git push

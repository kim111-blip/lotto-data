name: Update Lotto Data

on:
  schedule:
    - cron: "0 12 * * 6"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update lotto
        run: |
          node <<EOF
          const fs = require("fs");

          async function get(n){
            let url = "https://api.allorigins.win/raw?url=" +
              encodeURIComponent("https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=" + n);

            let res = await fetch(url);
            return await res.json();
          }

          async function run() {
            let n = 1200;

            while(true){
              let d = await get(n);

              if(d.returnValue !== "success"){
                n--;
                break;
              }
              n++;
            }

            let d = await get(n);

            let newData = {
              round: d.drwNo,
              date: d.drwNoDate,
              numbers: [d.drwtNo1,d.drwtNo2,d.drwtNo3,d.drwtNo4,d.drwtNo5,d.drwtNo6],
              bonus: d.bnusNo,
              first: d.firstWinamnt,
              firstCount: d.firstPrzwnerCo
            };

            let data = [];
            if(fs.existsSync("lotto.json")){
              data = JSON.parse(fs.readFileSync("lotto.json"));
            }

            if(!data.find(x=>x.round === newData.round)){
              data.unshift(newData);
              fs.writeFileSync("lotto.json", JSON.stringify(data,null,2));
            }
          }

          run();
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add lotto.json
          git commit -m "update lotto" || echo "no change"
          git push
